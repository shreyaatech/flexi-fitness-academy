    <script>
      // Fix for "Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // Some libraries (like react-router v7 instrumentation) try to assign to window.fetch.
      // We make it writable by defining a setter to allow this. This must be at the very top.
      if (typeof window !== 'undefined' && window.fetch) {
        (function() {
          var currentFetch = window.fetch;
          try {
            Object.defineProperty(window, 'fetch', {
              get: function() { return currentFetch; },
              set: function(v) { currentFetch = v; },
              configurable: true,
              enumerable: true
            });
          } catch (e) {
            console.warn('Could not make window.fetch writable:', e);
          }
        })();
      }
    </script>
